<div class="container mt-4">
<div class="d-flex justify-content-between align-items-center mb-4">
<h2>Dashboard</h2>
<button class="btn btn-secondary" routerLink="/">Volver</button>
</div>
<div *ngIf="loading" class="text-center">
<div class="spinner-border"></div>
</div>
<div *ngIf="metrics" class="row g-3">
<!-- Total -->
<div class="col-md-3">
<div class="card text-white bg-primary shadow-sm">
<div class="card-body text-center">
<h6><i class="bi bi-list-ul me-2"></i>Total Solicitudes</h6>
<h2>{{ metrics.total }}</h2>
</div>
</div>
</div>
<!-- Aprobadas -->
<div class="col-md-3">
<div class="card text-white bg-success shadow-sm">
<div class="card-body text-center">
<h6><i class="bi bi-check-circle me-2"></i>Aprobadas</h6>
<h2>{{ metrics.approved }}</h2>
</div>
</div>
</div>
<!-- Rechazadas -->
<div class="col-md-3">
<div class="card text-white bg-danger shadow-sm">
<div class="card-body text-center">
<h6><i class="bi bi-x-circle me-2"></i>Rechazadas</h6>
<h2>{{ metrics.rejected }}</h2>
</div>
</div>
</div>
<!-- Monto aprobado -->
<div class="col-md-3">
<div class="card text-white bg-dark shadow-sm">
<div class="card-body text-center">
<h6> <i class="bi bi-wallet2 me-2"></i>Monto Aprobado</h6>
<h4>{{ metrics.totalApprovedAmount | currency:'COP':'symbol':'1.0-0' }}</h4>
</div>
</div>
</div>
</div>
</div>
