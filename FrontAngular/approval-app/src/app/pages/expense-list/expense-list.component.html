

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">

        <h2>Solicitudes de Gastos</h2>
        <div>
            <button class="btn btn-primary me-2" routerLink="/create">Nueva solicitud </button>
            <button  class="btn btn-secondary " routerLink="/dashboard">Ver metricas </button>
        </div>
    </div>
    <div class="card p-3 mb-3">
        <div class="row">
            <div class="col">
                <label>Estado</label>
                <select class="form-select" name="" id="" [(ngModel)]="filters.status">
                    <option value="">Todos</option>
                    <option value="Pending">Pendientes</option>
                    <option value="Approved">Aprobado</option>
                    <option value="Rejected">Rechazado</option>
                </select>
            </div>
            <div class="col">
                <label>Categoría</label>
                <input class="form-control" placeholder="Categoría" type="text" [(ngModel)]="filters.category">
            </div>
            <div class="col">
                <label>Fecha Inicio</label>
                <input class="form-control"  type="date" [(ngModel)]="filters.startDate" >
            </div>
            <div class="col">
                <label>Fecha fin</label>
                <input class="form-control" type="date" [(ngModel)]="filters.endDate"  >
            </div>
            <div class="col">
                <button class="btn btn-primary w-100 mt-4" (click)="loadExpenses()">Filtrar</button>
            </div>
            <div class="col">
                <button class="btn btn-secondary w-100 mt-4" (click)="clearFilter()">Limpiar</button>
            </div>
        </div>
    </div>
    <table border="1" class="table table-striped table-hover" *ngIf="!loading && expenses.length">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Categoría</th>
                <th>Descripción</th>
                <th>Valor</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of expenses">
                <td>{{ item.id }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.description }}</td>
                <td>{{ item.amount }}</td>
                <td>
                    <span class="badge bg-warning" *ngIf="item.status === 'Pending'">Pendiente</span>
                    <span class="badge bg-success" *ngIf="item.status === 'Approved'">Aprobado</span>
                    <span class="badge bg-danger" *ngIf="item.status === 'Rejected'">Rechazado</span>
                </td>
                <td>
                    <button class="btn btn-sm btn-success me-1" (click)="approve(item.id)" [disabled]="item.status !== 'Pending'" title="Aprobar"><i class="bi bi-check-lg"></i></button>
                    <button class="btn btn-sm btn-danger me-1" (click)="reject(item.id)" [disabled]="item.status !== 'Pending'" title="Rechazar"><i class="bi bi-x-lg"></i></button>
                    <button class="btn btn-sm btn-primary me-1" [routerLink]="['/edit',item.id]" title="Editar"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-secondary" [routerLink]="['/detail',item.id]" title="Ver"><i class="bi bi-eye"></i></button>
                </td>
            </tr>
        </tbody>
    </table>
    <div *ngIf="!loading && !expenses.length">
        No hay datos
    </div>
</div>







<div *ngIf="loading">Cargando...</div>
<div *ngIf="error">{{error}}</div>
